<style>
  :root {

    --black: #0A0A0A; --surface: #141414; --surface2: #1E1E1E; --surface3: #282828;
    --border: #2E2E2E; --text: #F0F0F0; --text-muted: #888; --text-dim: #555;
    --green: #22C55E; --yellow: #EAB308; --blue: #3B82F6; --orange: #F97316;
    --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif; --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: var(--font-body); font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; flex-shrink: 0; }
  .topbar-logo { font-family: var(--font-display); font-size: 24px; color: var(--red); letter-spacing: 2px; display: flex; align-items: center; gap: 8px; }
  .topbar-logo span { color: var(--text); }
  .tab-switch { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 2px; }
  .tab-btn { padding: 6px 20px; border: none; background: transparent; color: var(--text-muted); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; transition: all 0.15s; }
  .tab-btn.active { background: var(--red); color: white; }
  .topbar-right { display: flex; align-items: center; gap: 16px; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .clock { color: var(--text); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; box-shadow: 0 0 6px var(--green); }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* POS VIEW */
  #pos-view { display: flex; width: 100%; }
  .menu-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .menu-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .search-bar { display: flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; gap: 8px; margin-bottom: 12px; }
  .search-bar input { background: none; border: none; outline: none; color: var(--text); font-family: var(--font-body); font-size: 13px; flex: 1; }
  .cat-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .cat-tab.active { background: var(--red); border-color: var(--red); color: white; }
  
  .menu-grid { flex: 1; overflow-y: auto; padding: 14px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; align-content: start; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .menu-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
  .menu-item:hover { border-color: var(--red); background: var(--surface3); }
  .item-emoji { font-size: 28px; margin-bottom: 8px; }
  .item-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
  .item-price { font-family: var(--font-mono); font-size: 12px; color: var(--red); font-weight: 600; }

  /* ORDER PANEL */
  .order-panel { width: 340px; display: flex; flex-direction: column; background: var(--surface); flex-shrink: 0; }
  .order-header { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .order-title { font-family: var(--font-display); font-size: 20px; color: var(--text); margin-bottom: 10px; }
  .order-type-row { display: flex; gap: 6px; }
  .order-type-btn { flex: 1; padding: 7px 4px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
  .order-type-btn.active { background: var(--red); border-color: var(--red); color: white; }
  
  .order-source { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .order-source-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
  .source-btns { display: flex; gap: 6px; }
  .source-btn { flex: 1; padding: 6px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 600; cursor: pointer; }
  .source-btn.active { background: var(--blue); border-color: var(--blue); color: white; }

  .order-fields { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .order-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-family: var(--font-body); font-size: 12px; color: var(--text); }
  
  #cartItems { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; }
  .cart-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; display: flex; gap: 10px; align-items: flex-start; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .cart-item-price { font-family: var(--font-mono); font-size: 11px; color: var(--red); }
  .qty-control { display: flex; gap: 4px; align-items: center; }
  .qty-btn { width: 22px; height: 22px; border: 1px solid var(--border); background: var(--surface3); color: var(--text); border-radius: 4px; cursor: pointer; }
  .qty-btn:hover { background: var(--red); border-color: var(--red); }
  
  .order-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .totals-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
  .totals-row.grand { font-size: 14px; font-weight: 600; color: var(--red); border-top: 1px solid var(--border); padding-top: 8px; }
  .order-actions { display: flex; gap: 6px; }
  .clear-btn { flex: 1; padding: 10px; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
  .place-btn { flex: 2; padding: 10px; background: var(--red); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }

  /* DASHBOARD VIEW */
  #dashboard-view { display: none; flex-direction: column; width: 100%; overflow: hidden; }
  .dash-controls { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .dash-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
  .stat-val { font-family: var(--font-mono); font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .stat-sub { font-size: 10px; color: var(--text-dim); }

  .kanban-view { display: flex; gap: 12px; padding: 14px 16px; flex: 1; overflow-x: auto; background: var(--black); }
  .kanban-col { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; min-width: 320px; display: flex; flex-direction: column; overflow: hidden; }
  .col-header { padding: 12px; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .col-title { font-size: 12px; font-weight: 600; color: var(--text); text-transform: uppercase; }
  .col-count { font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: var(--red); margin-top: 4px; }
  .col-content { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  
  .order-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .order-card-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .order-num { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--red); }
  .order-time { font-size: 10px; color: var(--text-muted); }
  .order-cust { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.5;}
  .cust-contact { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-top: 2px; }
  .order-items-preview { font-size: 11px; color: var(--text-muted); padding: 8px; background: var(--surface3); border-radius: 6px; margin-bottom: 8px; }
  .order-card-bottom { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .order-total { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--green); }
  .badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .badge { font-size: 9px; padding: 3px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
  .badge-branch { background: var(--surface3); color: var(--text); border: 1px solid var(--border); }
  .badge-source-website { background: var(--green); color: white; }
  .badge-source-counter { background: var(--blue); color: white; }
  
  .advance-btn { width: 100%; padding: 8px; background: var(--red); color: white; border: none; font-size: 11px; border-radius: 6px; font-weight: 600; cursor: pointer; }
  .advance-btn:hover { background: var(--red-dark); }
  
  /* TOAST */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface2); color: var(--text); padding: 12px 20px; border-radius: 8px; border: 1px solid var(--border); transition: transform 0.3s; z-index: 1000; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>

<div class="topbar">
  <div class="topbar-logo">🍕 <span>CRISPY</span></div>
  <div class="tab-switch">
    <button class="tab-btn active" onclick="switchView('pos')">POS</button>
    <button class="tab-btn" onclick="switchView('dashboard')">Dashboard</button>
  </div>
  <div class="topbar-right">
    <span><span class="status-dot"></span>Live</span>
    <span class="clock" id="clock">00:00:00</span>
  </div>
</div>

<div class="main">
  <!-- POS VIEW -->
  <div id="pos-view">
    <div class="menu-panel">
      <div class="menu-header">
        <div class="search-bar"><input type="text" id="searchInput" placeholder="Search items..." onkeyup="renderMenu()"></div>
        <div class="cat-tabs" id="catTabs"></div>
      </div>
      <div class="menu-grid" id="menuGrid"></div>
    </div>

    <div class="order-panel">
      <div class="order-header">
        <div class="order-title">ORDER</div>
        <div class="order-type-row">
          <button class="order-type-btn active" onclick="setType('dine-in', this)">Dine-in</button>
          <button class="order-type-btn" onclick="setType('takeaway', this)">Takeaway</button>
          <button class="order-type-btn" onclick="setType('delivery', this)">Delivery</button>
        </div>
        <div class="order-source">
          <div class="order-source-label">Order From</div>
          <div class="source-btns">
            <button class="source-btn active" onclick="setSource('Counter', this)">Counter</button>
            <button class="source-btn" onclick="setSource('Website', this)">Website</button>
          </div>
        </div>
        <div class="order-fields">
          <!-- BRANCH SELECTION FOR POS -->
          <select id="posBranch" class="order-input" style="font-weight: bold; border-color: var(--text-dim);">
            <option value="Main Branch">Gamber Branch</option>
            <option value="Branch 2">Sahiwal Branch</option>
            <option value="Branch 3">Noor Park Branch</option>
          </select>
          <input type="text" class="order-input" id="custName" placeholder="Customer name">
          <input type="tel" class="order-input" id="custPhone" placeholder="Phone Number (Required for delivery)">
          <input type="text" class="order-input" id="tableNum" placeholder="Table # OR Delivery Address">
        </div>
      </div>
      <div id="cartItems"></div>
      <div class="order-footer">
        <div class="totals-row"><span>Subtotal</span><span id="subtotalVal">Rs. 0</span></div>
        <div class="totals-row grand"><span>Total</span><span id="grandTotal">Rs. 0</span></div>
        <div class="order-actions">
          <button class="clear-btn" onclick="clearCart()">Clear</button>
          <button class="place-btn" id="placeBtn" onclick="placeOrder()">Place Order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboard-view">
    <!-- DASHBOARD BRANCH FILTER -->
    <div class="dash-controls">
      <span style="font-size: 12px; color: var(--text-muted); font-weight: 600;">FILTER BY BRANCH:</span>
      <select id="dashBranchFilter" class="order-input" style="width: 200px;" onchange="renderDashboard()">
        <option value="All">All Branches</option>
        <option value="Main Branch">Gamber Branch</option>
        <option value="Branch 2">Sahiwal Branch</option>
        <option value="Branch 3">Noor Park Branch</option>
      </select>
    </div>

    <div class="dash-stats" id="dashStats"></div>
    <div class="kanban-view">
      <div class="kanban-col">
        <div class="col-header"><div class="col-title">📝 New</div><div class="col-count" id="cnt-new">0</div></div>
        <div class="col-content" id="col-new"></div>
      </div>
      <div class="kanban-col">
        <div class="col-header"><div class="col-title">🔥 Preparing</div><div class="col-count" id="cnt-prep">0</div></div>
        <div class="col-content" id="col-prep"></div>
      </div>
      <div class="kanban-col">
        <div class="col-header"><div class="col-title">✓ Ready</div><div class="col-count" id="cnt-ready">0</div></div>
        <div class="col-content" id="col-ready"></div>
      </div>
      <div class="kanban-col">
        <div class="col-header"><div class="col-title">🎉 Done</div><div class="col-count" id="cnt-done">0</div></div>
        <div class="col-content" id="col-done"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

const CATS =["All", ...new Set(MENU.map(i => i.cat))];
let activeCategory = "All", searchQuery = "", cart =[];
let orderType = "dine-in", orderSource = "Counter";
let orders =[], orderCounter = 1001;

function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-PK', { hour12: false }); }
setInterval(updateClock, 1000); updateClock();

function switchView(v) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (v === 'pos' && i === 0) || (v === 'dashboard' && i === 1)));
  document.getElementById('pos-view').style.display = v === 'pos' ? 'flex' : 'none';
  document.getElementById('dashboard-view').style.display = v === 'dashboard' ? 'flex' : 'none';
  if (v === 'dashboard') renderDashboard();
}

function renderCatTabs() { document.getElementById('catTabs').innerHTML = CATS.map(c => `<button class="cat-tab ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`).join(''); }
function setCategory(c) { activeCategory = c; renderCatTabs(); renderMenu(); }

function renderMenu() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = MENU.filter(i => (activeCategory === 'All' || i.cat === activeCategory) && i.name.toLowerCase().includes(searchQuery))
    .map(i => `<div class="menu-item" onclick="addToCart(${i.id})"><div class="item-emoji">${i.emoji}</div><div class="item-name">${i.name}</div><div class="item-price">Rs. ${i.price}</div></div>`).join('');
}

function addToCart(id) {
  const item = MENU.find(i => i.id === id);
  const existing = cart.find(c => c.id === id);
  if (existing) existing.qty++; else cart.push({ ...item, qty: 1 });
  renderCart(); showToast(`${item.name} added`);
}
function changeQty(id, delta) {
  const idx = cart.findIndex(c => c.id === id);
  if (idx === -1) return; cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  renderCart();
}

function renderCart() {
  document.getElementById('cartItems').innerHTML = cart.map(i => `<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">${i.name}</div><div class="cart-item-price">Rs. ${i.price * i.qty}</div></div><div class="qty-control"><button class="qty-btn" onclick="changeQty(${i.id}, -1)">−</button><span>${i.qty}</span><button class="qty-btn" onclick="changeQty(${i.id}, 1)">+</button></div></div>`).join('');
  const sub = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('subtotalVal').textContent = `Rs. ${sub}`;
  document.getElementById('grandTotal').textContent = `Rs. ${sub}`;
  document.getElementById('placeBtn').disabled = cart.length === 0;
}
function clearCart() { 
  cart =[]; 
  document.getElementById('custName').value = '';
  document.getElementById('custPhone').value = '';
  document.getElementById('tableNum').value = '';
  renderCart(); 
}

function setType(type, el) { orderType = type; document.querySelectorAll('.order-type-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
function setSource(src, el) { orderSource = src; document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }

async function placeOrder() {
  if (cart.length === 0) return;
  document.getElementById('placeBtn').disabled = true;

  const branch = document.getElementById('posBranch').value;
  const order = {
    localId: orderCounter++,
    branch: branch,
    items: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty })),
    type: orderType, 
    source: orderSource,
    customer: document.getElementById('custName').value || 'Walk-in',
    phone: document.getElementById('custPhone').value,       
    address: document.getElementById('tableNum').value,      
    total: cart.reduce((s, i) => s + i.price * i.qty, 0),
    status: 'new', 
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
  };

  await db.collection('orders').add(order);
  showToast(`✅ Order placed at ${branch}!`);
  clearCart();
  document.getElementById('placeBtn').disabled = false;
}

// 🔥 UPDATE: FETCH ORDERS WITH 4:00 AM "BUSINESS DAY" RESET 🔥
db.collection('orders').orderBy('timestamp', 'desc').onSnapshot(snap => {
  
  // Calculate the start of the current shift
  const startOfDay = new Date();
  if (startOfDay.getHours() < 4) {
    // If it is 1 AM, 2 AM, or 3 AM, we still count it as "Yesterday's" shift
    startOfDay.setDate(startOfDay.getDate() - 1);
  }
  // Set the reset time to exactly 4:00 AM
  startOfDay.setHours(4, 0, 0, 0);

  orders = snap.docs
    .map(doc => ({ firebaseId: doc.id, ...doc.data(), time: doc.data().timestamp ? doc.data().timestamp.toDate() : new Date() }))
    // Keep all orders placed after the 4:00 AM shift start
    .filter(order => order.time >= startOfDay);

  if (document.getElementById('dashboard-view').style.display === 'flex') {
    renderDashboard();
  }
});

async function advanceOrder(firebaseId) {
  const order = orders.find(o => o.firebaseId === firebaseId);
  const flow =['new', 'preparing', 'ready', 'done'];
  const newStatus = flow[flow.indexOf(order.status) + 1];
  if(newStatus) {
    await db.collection('orders').doc(firebaseId).update({ status: newStatus });
  }
}

// 🔥 BUG FIX: Mapped columns properly instead of using substring(0,4) 🔥
function renderDashboard() {
  const filterBranch = document.getElementById('dashBranchFilter').value;
  
  const filteredOrders = filterBranch === "All" ? orders : orders.filter(o => (o.branch || "Main Branch") === filterBranch);

  document.getElementById('dashStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-val red">${filteredOrders.length}</div></div>
    <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-val" style="color:var(--green)">Rs.${filteredOrders.filter(o=>o.status==='done').reduce((s,o)=>s+o.total,0)}</div></div>
    <div class="stat-card"><div class="stat-label">Active</div><div class="stat-val" style="color:var(--yellow)">${filteredOrders.filter(o=>o.status!=='done').length}</div></div>
  `;

  const cols = ['new', 'preparing', 'ready', 'done'];
  const colIds =['new', 'prep', 'ready', 'done']; // HTML IDs for the columns
  const labels =['▶ Start Prep', '✓ Mark Ready', '🎉 Mark Done', ''];
  
  cols.forEach((status, i) => {
    const colId = colIds[i]; // Get proper HTML id mapping
    const colOrders = filteredOrders.filter(o => o.status === status);
    
    document.getElementById(`cnt-${colId}`).textContent = colOrders.length;
    document.getElementById(`col-${colId}`).innerHTML = colOrders.map(o => `
      <div class="order-card">
        <div class="order-card-top"><b>#${o.localId||o.firebaseId.substring(0,4)}</b> <span>${Math.floor((new Date()-o.time)/60000)}m ago</span></div>
        
        <!-- DISPLAY CUSTOMER NAME, PHONE, AND ADDRESS/TABLE -->
        <div class="order-cust">
          ${o.customer}
          ${o.phone ? `<div class="cust-contact">📞 ${o.phone}</div>` : ''}
          ${o.address ? `<div class="cust-contact">📍 ${o.address}</div>` : ''}
          ${o.table && !o.address ? `<div class="cust-contact">🪑 T-${o.table}</div>` : ''}
        </div>
        
        <div class="order-items-preview">${o.items.map(i=>`${i.qty}x ${i.name}`).join(', ')}</div>
        <div class="order-card-bottom">
          <span style="color:var(--green); font-weight:bold;">Rs. ${o.total}</span>
          <div class="badges">
            <span class="badge badge-branch">${o.branch || "Main Branch"}</span>
            <span class="badge ${o.source === 'Website' ? 'badge-source-website' : 'badge-source-counter'}">${o.source}</span>
          </div>
        </div>
        ${labels[i] ? `<button class="advance-btn" onclick="advanceOrder('${o.firebaseId}')">${labels[i]}</button>` : ''}
      </div>
    `).join('');
  });
}

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

renderCatTabs(); renderMenu();
